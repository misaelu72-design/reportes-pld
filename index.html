<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reportes PLD — CECOM</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--azul:#1F3864;--azul2:#2E75B6;--verde:#375623;--naranja:#E26B0A;--bg:#F4F6FA;--card:#FFFFFF;--texto:#1a1a2e;--muted:#6b7280;--border:#e5e7eb;--pos:#16a34a;--neg:#dc2626;--pos-bg:#dcfce7;--neg-bg:#fee2e2}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--texto);min-height:100vh}
  header{background:var(--azul);color:white;padding:0 2rem;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(31,56,100,.4)}
  .header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:64px;flex-wrap:wrap;gap:8px}
  .logo{display:flex;align-items:center;gap:12px}
  .logo-icon{width:36px;height:36px;background:var(--naranja);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600}
  .logo-text{font-size:16px;font-weight:600}
  .logo-sub{font-size:11px;opacity:.65;font-weight:300}
  .header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .corte-badge{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:5px 14px;font-size:12px;font-family:'DM Mono',monospace}
  .upd-badge{font-size:11px;opacity:.55}
  main{max-width:1200px;margin:0 auto;padding:2rem}
  .section-title{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:1rem;margin-top:2.5rem}

  /* Loading */
  .loading{text-align:center;padding:4rem;color:var(--muted)}
  .spinner{width:32px;height:32px;border:3px solid #e5e7eb;border-top-color:var(--azul2);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Error */
  .error-box{background:#fff5f5;border:1px solid #fecaca;border-radius:12px;padding:1.5rem;text-align:center;color:var(--neg)}

  /* KPIs */
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px}
  .kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem;position:relative;overflow:hidden;transition:transform .15s,box-shadow .15s}
  .kpi:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.08)}
  .kpi-accent{position:absolute;top:0;left:0;right:0;height:3px}
  .kpi-label{font-size:12px;color:var(--muted);margin-bottom:6px}
  .kpi-value{font-size:26px;font-weight:600;letter-spacing:-1px;line-height:1}
  .kpi-delta{display:inline-flex;align-items:center;gap:3px;font-size:12px;font-weight:500;font-family:'DM Mono',monospace;margin-top:8px;padding:2px 8px;border-radius:20px}
  .delta-pos{background:var(--pos-bg);color:var(--pos)}
  .delta-neg{background:var(--neg-bg);color:var(--neg)}
  .delta-neu{background:#f3f4f6;color:var(--muted)}


  /* Tabla */
  .table-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
  .table-header{padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
  .table-header h3{font-size:14px;font-weight:600}
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead th{background:#f9fafb;padding:10px 16px;text-align:left;font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border)}
  thead th:not(:first-child){text-align:right}
  tbody tr{border-bottom:1px solid #f3f4f6;transition:background .1s}
  tbody tr:hover{background:#f9fafb}
  tbody tr:last-child{border-bottom:none}
  td{padding:12px 16px}
  td:not(:first-child){text-align:right;font-family:'DM Mono',monospace}
  .suc-name{font-weight:500;display:flex;align-items:center;gap:8px}
  .suc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;font-family:'DM Mono',monospace}
  .pill-pos{background:var(--pos-bg);color:var(--pos)}
  .pill-neg{background:var(--neg-bg);color:var(--neg)}
  .pill-neu{background:#f3f4f6;color:var(--muted)}

  /* Documentación */
  .doc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px}
  .doc-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem}
  .doc-label{font-size:12px;color:var(--muted);margin-bottom:4px}
  .doc-pct{font-size:26px;font-weight:600;margin-bottom:2px}
  .doc-count{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace}
  .progress{width:100%;height:6px;background:#e5e7eb;border-radius:3px;margin-top:10px;overflow:hidden}
  .progress-bar{height:100%;border-radius:3px;transition:width .6s ease}

  /* Descargas */
  .downloads-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}
  .dl-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem;display:flex;align-items:center;gap:14px;text-decoration:none;color:var(--texto);transition:transform .15s,box-shadow .15s,border-color .15s}
  .dl-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.08);border-color:var(--azul2)}
  .dl-icon{width:42px;height:42px;border-radius:10px;background:#e8f0fe;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px}
  .dl-info{flex:1}
  .dl-name{font-weight:600;font-size:13px;margin-bottom:2px}
  .dl-meta{font-size:11px;color:var(--muted)}

  footer{text-align:center;padding:2rem;color:var(--muted);font-size:12px;border-top:1px solid var(--border);margin-top:3rem}

  .suc-colors{--c0:#1F3864;--c1:#2E75B6;--c2:#375623;--c3:#E26B0A;--c4:#7B3F00;--c5:#5B2D8E;--c6:#B5451B;--c7:#0D6E8C;--c8:#2D6A4F}
</style>
</head>
<body class="suc-colors">

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">C</div>
      <div>
        <div class="logo-text">CECOM — Reportes PLD</div>
        <div class="logo-sub">Prevención de Lavado de Dinero</div>
      </div>
    </div>
    <div class="header-right">
      <span class="corte-badge" id="badge-corte">Cargando...</span>
      <span class="upd-badge" id="badge-upd"></span>
    </div>
  </div>
</header>

<main>
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p>Cargando datos...</p>
  </div>
  <div id="contenido" style="display:none"></div>
</main>

<footer id="footer"></footer>

<script>
const COLORES_SUC = [
  "#1F3864","#2E75B6","#375623","#E26B0A",
  "#7B3F00","#5B2D8E","#B5451B","#0D6E8C","#2D6A4F"
];

function fmt(n){return Number(n).toLocaleString("es-MX")}
function pct(n,t){return t?((n/t)*100).toFixed(1)+"%":"0.0%"}
function delta(n){
  if(n>0) return `<span class="pill pill-pos">+${fmt(n)}</span>`;
  if(n<0) return `<span class="pill pill-neg">${fmt(n)}</span>`;
  return `<span class="pill pill-neu">0</span>`;
}
function deltaKpi(n){
  if(n>0) return `<span class="kpi-delta delta-pos">▲ +${fmt(n)}</span>`;
  if(n<0) return `<span class="kpi-delta delta-neg">▼ ${fmt(n)}</span>`;
  return `<span class="kpi-delta delta-neu">sin cambio</span>`;
}


function render(d){
  const m  = d.meta;
  const k  = d.kpis;
  const ss = d.sucursales;
  const tc = k.total_act;

  // Header
  document.getElementById("badge-corte").textContent =
    `Corte: ${m.fecha_anterior_corta} vs ${m.fecha_actual_corta}`;
  document.getElementById("badge-upd").textContent =
    `Actualizado: ${m.generado}`;

  // KPIs
  const kpiHtml = `
  <div class="section-title">Resumen global · ${m.num_sucursales} sucursales</div>
  <div class="kpi-grid">
    <div class="kpi">
      <div class="kpi-accent" style="background:#1F3864"></div>
      <div class="kpi-label">Total clientes en base</div>
      <div class="kpi-value">${fmt(k.total_act)}</div>
      ${deltaKpi(k.delta_total)}
    </div>
    <div class="kpi">
      <div class="kpi-accent" style="background:#E26B0A"></div>
      <div class="kpi-label">Clientes nuevos</div>
      <div class="kpi-value">${fmt(k.clientes_nuevos)}</div>
      ${deltaKpi(k.clientes_nuevos)}
    </div>
    <div class="kpi">
      <div class="kpi-accent" style="background:#7c3aed"></div>
      <div class="kpi-label">Cambios de estatus</div>
      <div class="kpi-value">${fmt(k.cambios_status)}</div>
      <span class="kpi-delta delta-neu">${pct(k.cambios_status, k.total_act)} de la base</span>
    </div>
    <div class="kpi">
      <div class="kpi-accent" style="background:#375623"></div>
      <div class="kpi-label">Verificados KYC</div>
      <div class="kpi-value">${fmt(k.verif_kyc_act)}</div>
      ${deltaKpi(k.verif_kyc_act - k.verif_kyc_ant)}
    </div>
    <div class="kpi">
      <div class="kpi-accent" style="background:#dc2626"></div>
      <div class="kpi-label">Bloqueados por KYC</div>
      <div class="kpi-value">${fmt(k.bloq_kyc_act)}</div>
      ${deltaKpi(k.bloq_kyc_act - k.bloq_kyc_ant)}
    </div>
    <div class="kpi">
      <div class="kpi-accent" style="background:#0891b2"></div>
      <div class="kpi-label">Pend. Validación KYC</div>
      <div class="kpi-value">${fmt(k.pend_kyc_act)}</div>
      ${deltaKpi(k.pend_kyc_act - k.pend_kyc_ant)}
    </div>
  </div>`;


  // Tabla sucursales
  const tablaSucs = ss.map((s, i) => `
    <tr>
      <td><div class="suc-name">
        <span class="suc-dot" style="background:${COLORES_SUC[i%COLORES_SUC.length]}"></span>
        ${s.nombre}
      </div></td>
      <td style="font-weight:600">${fmt(s.total_act)}</td>
      <td>${fmt(s.re_act)}</td>
      <td>${fmt(s.bloq_ops)}</td>
      <td>${fmt(s.bloq_kyc)}</td>
      <td>${fmt(s.verif_kyc)}</td>
      <td>${delta(s.delta)}</td>
    </tr>`).join("");

  const totalRow = `
    <tr style="background:#f9fafb;font-weight:600">
      <td>Total</td>
      <td>${fmt(k.total_act)}</td>
      <td>${fmt(k.re_act)}</td>
      <td>${fmt(k.bloq_ops_act)}</td>
      <td>${fmt(k.bloq_kyc_act)}</td>
      <td>${fmt(k.verif_kyc_act)}</td>
      <td>${delta(k.delta_total)}</td>
    </tr>`;

  const tablaHtml = `
  <div class="section-title">Desglose por sucursal · ${m.fecha_actual_larga}</div>
  <div class="table-card">
    <div class="table-header">
      <h3>Totales al ${m.fecha_actual_larga}</h3>
      <span style="font-size:12px;color:var(--muted)">vs ${m.fecha_anterior_larga}</span>
    </div>
    <table>
      <thead><tr>
        <th>Sucursal</th><th>Total base</th><th>Reg. Express</th>
        <th>Bloq. Ops</th><th>Bloq. KYC</th><th>Verif. KYC</th><th>Variación</th>
      </tr></thead>
      <tbody>${tablaSucs}${totalRow}</tbody>
    </table>
  </div>`;

  // Documentación
  const pAviso  = tc ? (k.aviso_act / tc * 100).toFixed(1) : 0;
  const pHuella = tc ? (k.huella_act / tc * 100).toFixed(1) : 0;
  const pIdVenc = tc ? (k.id_venc_act / tc * 100).toFixed(1) : 0;
  const pSinAv  = tc ? ((tc - k.aviso_act) / tc * 100).toFixed(1) : 0;

  const docHtml = `
  <div class="section-title">Indicadores de documentación · ${m.fecha_actual_larga}</div>
  <div class="doc-grid">
    <div class="doc-card">
      <div class="doc-label">Con Aviso de Privacidad</div>
      <div class="doc-pct">${pAviso}%</div>
      <div class="doc-count">${fmt(k.aviso_act)} de ${fmt(tc)}</div>
      <div class="progress"><div class="progress-bar" style="width:${pAviso}%;background:#2E75B6"></div></div>
    </div>
    <div class="doc-card">
      <div class="doc-label">Con Huella Digital</div>
      <div class="doc-pct">${pHuella}%</div>
      <div class="doc-count">${fmt(k.huella_act)} de ${fmt(tc)}</div>
      <div class="progress"><div class="progress-bar" style="width:${pHuella}%;background:#375623"></div></div>
    </div>
    <div class="doc-card">
      <div class="doc-label">ID Vencida (≤ 31/12/2025)</div>
      <div class="doc-pct" style="color:var(--neg)">${pIdVenc}%</div>
      <div class="doc-count">${fmt(k.id_venc_act)} de ${fmt(tc)}</div>
      <div class="progress"><div class="progress-bar" style="width:${pIdVenc}%;background:#dc2626"></div></div>
    </div>
    <div class="doc-card">
      <div class="doc-label">Sin Aviso de Privacidad</div>
      <div class="doc-pct" style="color:var(--neg)">${pSinAv}%</div>
      <div class="doc-count">${fmt(tc - k.aviso_act)} de ${fmt(tc)}</div>
      <div class="progress"><div class="progress-bar" style="width:${pSinAv}%;background:#f97316"></div></div>
    </div>
  </div>`;

  // Descargas — se generan automáticamente por sucursal
  const dlSucursales = ss.map(s => `
    <a class="dl-card" href="${s.nombre}_Comparativa_PLD_${m.fecha_anterior_corta}_vs_${m.fecha_actual_corta}.xlsx" download>
      <div class="dl-icon" style="background:#e8f4ff">📋</div>
      <div class="dl-info">
        <div class="dl-name">${s.nombre} — Comparativa</div>
        <div class="dl-meta">${m.fecha_anterior_larga} vs ${m.fecha_actual_larga}</div>
      </div>
      <span style="color:var(--muted);font-size:18px">↓</span>
    </a>`).join("");

  const dlHtml = `
  <div class="section-title">Descargar reportes</div>
  <div class="downloads-grid">
    <a class="dl-card" href="Reporte_PLD_TODAS_SUCURSALES_${m.fecha_anterior_corta}_vs_${m.fecha_actual_corta}.xlsx" download>
      <div class="dl-icon">📊</div>
      <div class="dl-info">
        <div class="dl-name">Reporte Consolidado · Todas las Sucursales</div>
        <div class="dl-meta">${m.fecha_anterior_larga} vs ${m.fecha_actual_larga} · 11 hojas</div>
      </div>
      <span style="color:var(--muted);font-size:18px">↓</span>
    </a>
    ${dlSucursales}
  </div>`;

  document.getElementById("contenido").innerHTML =
    kpiHtml + tablaHtml + docHtml + dlHtml;

  document.getElementById("footer").innerHTML =
    `CECOM · Reportes PLD · ${m.fecha_anterior_larga} vs ${m.fecha_actual_larga} · Generado el ${m.generado}`;
}

// Cargar datos.json automáticamente
fetch("datos.json?v=" + Date.now())
  .then(r => {
    if(!r.ok) throw new Error("No se encontró datos.json");
    return r.json();
  })
  .then(d => {
    document.getElementById("loading").style.display  = "none";
    document.getElementById("contenido").style.display = "block";
    render(d);
  })
  .catch(err => {
    document.getElementById("loading").innerHTML = `
      <div class="error-box">
        <p style="font-weight:600;margin-bottom:8px">No se encontró datos.json</p>
        <p style="font-size:13px">Corre el script de Python para generar los datos,<br>
        luego sube <strong>datos.json</strong> a GitHub junto con los Excel.</p>
      </div>`;
  });
</script>
</body>
</html>
